<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dados Pessoais</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: #cbb7f4;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .container {
      width: 100%;
      max-width: 1400px;
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    /* MENU LATERAL */

    .sidebar {
      width: 320px;
      background: #f4f4f4;
      border-radius: 20px;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 700px;
    }

    .top-sidebar {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .perfil {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .perfil img {
      width: 90px;
      height: 90px;
    }

    .perfil h2 {
      font-size: 28px;
      font-weight: 400;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .menu button {
      width: 100%;
      height: 48px;
      border-radius: 30px;
      border: 1px solid #555;
      background: transparent;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .menu button.active {
      border: 2px solid #7dd3fc;
      font-weight: bold;
    }

    .menu button:hover {
      background: #ececec;
    }

    .logout {
      width: 100%;
      height: 48px;
      border-radius: 30px;
      border: 1px solid #555;
      background: transparent;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: 0.3s;
    }

    .logout:hover {
      background: #ececec;
    }

    /* CONTEÚDO */

    .content {
      flex: 1;
    }

    .content h1 {
      font-size: 72px;
      margin-bottom: 30px;
      color: #000;
    }

    .card {
      border: 1px solid rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      padding: 50px;
      min-height: 620px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .dados-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 70px 80px;
    }

    .campo {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .campo label {
      font-size: 18px;
      color: #222;
    }

    .campo input {
      border: none;
      border-bottom: 1px solid transparent;
      background: transparent;
      font-size: 18px;
      outline: none;
      padding-bottom: 5px;
    }

    .editar {
      align-self: flex-end;
      font-size: 28px;
      color: #8b5cf6;
      cursor: pointer;
      transition: 0.3s;
    }

    .editar:hover {
      color: #6d28d9;
    }

    /* RESPONSIVO */

    @media (max-width: 1000px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-height: auto;
      }

      .content h1 {
        font-size: 50px;
      }

      .dados-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- MENU -->

    <aside class="sidebar">

      <div class="top-sidebar">

        <div class="perfil">

          <img
            src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
            alt="Usuário"
          >

          <h2>Olá!</h2>

        </div>

        <div class="menu">

          <button class="active">Dados Pessoais</button>

          <button>Pedidos</button>

          <button>Endereços</button>

        </div>

      </div>

      <button class="logout">
        ⬅ Sair
      </button>

    </aside>

    <!-- CONTEÚDO -->

    <main class="content">

      <h1>Dados Pessoais</h1>

      <div class="card">

        <div class="dados-grid">

          <div class="campo">
            <label>Nome</label>
            <input type="text" value="">
          </div>

          <div class="campo">
            <label>Sobrenome</label>
            <input type="text" value="">
          </div>

          <div class="campo">
            <label>E-mail</label>
            <input type="email" value="">
          </div>

          <div class="campo">
            <label></label>
            <input type="text" value="">
          </div>

          <div class="campo">
            <label>CPF</label>
            <input type="text" value="">
          </div>

          <div class="campo">
            <label>Gênero</label>
            <input type="text" value="">
          </div>

          <div class="campo">
            <label>Data de nascimento</label>
            <input type="text" value="">
          </div>

          <div class="campo">
            <label>Telefone</label>
            <input type="text" value="">
          </div>

        </div>

        <div class="editar">
          EDITAR
        </div>

      </div>

    </main>

  </div>

</body>

</html>
