<div id="content-container">
  <div class="card">
    <img id="kidivertepet-logo" src="assets/login/kidivertepet.png" alt="Login Image" class="login-image">

    <section>
      <form (ngSubmit)="onSubmit()">
        <div *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </div>

        <div class="field">
          <label for="email">E-mail</label>
          <div class="input-wrap">
            <mat-icon class="icon">email</mat-icon>
            <input 
              type="email" 
              id="email" 
              name="email" 
              [(ngModel)]="form.email" 
              placeholder="seu@email.com"
              autocomplete="email" 
              [disabled]="isLoading"
            />
          </div>
        </div>

        <div class="field">
          <label for="senha">Senha</label>
          <div class="input-wrap">
            <mat-icon class="icon">lock</mat-icon>
            <input 
              type="password" 
              id="senha" 
              name="password" 
              [(ngModel)]="form.password" 
              placeholder="••••••••"
              [disabled]="isLoading" 
            />
          </div>
        </div>

        <button 
          class="login-button" 
          mat-flat-button 
          type="submit"
          [disabled]="isLoading"
        >
          {{ isLoading ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>

      <p class="register-link-text">Ainda não tem uma conta?</p>
      <a class="register-link-text" href="/register">Cadastre-se</a>
    </section>
  </div>
</div>
