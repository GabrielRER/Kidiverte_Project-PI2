<div class="container">

  <!-- MENU LATERAL -->
  <aside class="sidebar">

    <div class="perfil">
      <div class="icone">
        <span>👤</span>
      </div>

      <h2>Olá, {{ firstName }}!</h2>''
      <p>{{ currentUser?.email }}</p>
    </div>

    <button class="menu-btn" [class.active]="abaAtiva === 'dados'" (click)="selecionarAba('dados')">
      <mat-icon>person</mat-icon>
      Dados Pessoais
    </button>

    <button class="menu-btn" [class.active]="abaAtiva === 'pedidos'" (click)="selecionarAba('pedidos')">
      <mat-icon>shopping_cart</mat-icon>
      Pedidos
    </button>

    <button class="menu-btn" [class.active]="abaAtiva === 'enderecos'" (click)="selecionarAba('enderecos')">
      <mat-icon>location_on</mat-icon>
      Endereços
    </button>

    <button class="menu-btn sair" (click)="logout()">
      <mat-icon>logout</mat-icon>
      Sair
    </button>

  </aside>

  <!-- CONTEÚDO -->
  <section class="content">

    <!-- DADOS PESSOAIS -->
    <div *ngIf="abaAtiva === 'dados'">

      <h1>Dados Pessoais</h1>

      <div class="card">

        <div *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </div>

        <div class="grid">

          <div class="input-group">
            <label>Nome</label>
            <input type="text" [(ngModel)]="formData.name" [disabled]="!isEditing || isLoading"
              placeholder="Seu nome" />
          </div>

          <div class="input-group">
            <label>E-mail</label>
            <input type="email" [(ngModel)]="formData.email" [disabled]="!isEditing || isLoading"
              placeholder="seu@email.com" />
          </div>

          <div class="input-group full">
            <label>Membro desde</label>
            <input type="text" [value]="(currentUser?.createdAt | date:'dd/MM/yyyy') ?? 'Não informado'" disabled />
          </div>

        </div>

        <div class="footer">
          <button *ngIf="!isEditing" class="editar-btn" (click)="toggleEdit()">
            <mat-icon>edit</mat-icon>
            EDITAR
          </button>

          <div *ngIf="isEditing" class="button-group">
            <button class="salvar-btn" (click)="salvarDados()" [disabled]="isLoading">
              <mat-icon>check</mat-icon>
              {{ isLoading ? 'SALVANDO...' : 'SALVAR' }}
            </button>
            <button class="cancelar-btn" (click)="toggleEdit()" [disabled]="isLoading">
              <mat-icon>close</mat-icon>
              CANCELAR
            </button>
          </div>
        </div>

      </div>

    </div>

    <!-- PEDIDOS -->
    <div *ngIf="abaAtiva === 'pedidos'">

      <h1>Pedidos</h1>

      <div class="card">
        <p>Nenhum pedido encontrado.</p>
      </div>

    </div>

    <!-- ENDEREÇOS -->
    <div *ngIf="abaAtiva === 'enderecos'">

      <h1>Endereços</h1>

      <div class="card">
        <p>Nenhum endereço cadastrado.</p>
      </div>

    </div>

  </section>

</div>
