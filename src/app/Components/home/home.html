<div id="home-container">
    <div id="home-menu-content">
        <div id="categories-images">
            <img src="assets/home_menu/carrinhos.png" alt="carrinhos" (click)="filtrarCategoria(1)" style="cursor: pointer;">
            <img src="assets/home_menu/blocos.png" alt="blocos" (click)="filtrarCategoria(2)" style="cursor: pointer;">
            <img src="assets/home_menu/bonecas.png" alt="bonecas" (click)="filtrarCategoria(3)" style="cursor: pointer;">
            <img src="assets/home_menu/colecionaveis.png" alt="colecionaveis" (click)="filtrarCategoria(4)" style="cursor: pointer;">
            <img src="assets/home_menu/bebes.png" alt="bebes" (click)="filtrarCategoria(5)" style="cursor: pointer;">
            <img src="assets/home_menu/esportes.png" alt="esportes" (click)="filtrarCategoria(6)" style="cursor: pointer;">
            <img src="assets/home_menu/jogos.png" alt="jogos" (click)="filtrarCategoria(7)" style="cursor: pointer;">
        </div>

        <div class="carrossel-container">
            <div id="new-toys">
                <section>
                    <h2>BRINQUEDOS NOVOS NO PEDAÇO</h2>
                </section>

                <div class="carrossel-wrapper">

                    <button class="arrow-btn left" (click)="scrollCarrosselNewToys(-1)" aria-label="before"></button>

                    <div class="carrossel-items" #carrosselNewToys>
                        @for (item of productsNewToys; track item.id){
                        <app-card [product]="item"></app-card>
                        }
                    </div>

                    <button class="arrow-btn right" (click)="scrollCarrosselNewToys(1)" aria-label="next"></button>

                </div>

            </div>

            <div id="best-sellers">
                <section>
                    <h2>MAIS VENDIDOS</h2>
                </section>

                <div class="carrossel-wrapper">

                    <button class="arrow-btn left" (click)="scrollCarrosselBestSellers(-1)"
                        aria-label="before"></button>

                    <div class="carrossel-items" #carrosselBestSellers>
                        @for (item of productsBestSellers; track item.id){
                        <app-card [product]="item"></app-card>
                        }
                    </div>

                    <button class="arrow-btn right" (click)="scrollCarrosselBestSellers(1)" aria-label="next"></button>

                </div>

            </div>
        </div>

    </div>

    <div id="brand_icons">
        <img class="big-brand-icon" src="assets/brand_icons/estrela.png" alt="estrela" (click)="filtrarMarca('Estrela')" style="cursor: pointer;">
        <div class="small-icons-container">
            <img class="small-brand-icons" src="assets/brand_icons/melissa&doug.png" alt="melissa&doug" (click)="filtrarMarca('Melissa & Doug')" style="cursor: pointer;">
            <img class="small-brand-icons" src="assets/brand_icons/hasbro.png" alt="hasbro" (click)="filtrarMarca('Hasbro')" style="cursor: pointer;">
        </div>
        <img class="big-brand-icon" src="assets/brand_icons/mattel.png" alt="mattel" (click)="filtrarMarca('Mattel')" style="cursor: pointer;">
        <div class="small-icons-container">
            <img class="small-brand-icons" src="assets/brand_icons/funko.png" alt="funko" (click)="filtrarMarca('Funko')" style="cursor: pointer;">
            <img class="small-brand-icons" src="assets/brand_icons/lego.png" alt="lego" (click)="filtrarMarca('Lego')" style="cursor: pointer;">
        </div>
    </div>
</div>
