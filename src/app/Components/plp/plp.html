<div class="container">

  <!-- FILTRO -->
  <aside class="filtro">
    <h2>Filtros</h2>

    <div class="filtro-secao">
      <h3>Categoria</h3>
      <label><input type="checkbox"> Carrinhos</label>
      <label><input type="checkbox"> Bonecas</label>
    </div>

    <div class="filtro-secao">
      <h3>Faixa de preço</h3>

      <input
        type="range"
        min="5"
        max="5000"
        [value]="precoMax"
        (input)="onPrecoChange($event)"
      >

      <p>Até R$ {{ precoMax }}</p>
    </div>

    <div class="logo">
      <!-- COLOCAR IMAGEM DO PROJETO AQUI -->
      <img src="caminho-da-sua-imagem.png">
    </div>
  </aside>

  <!-- PRODUTOS -->
  <main class="produtos">

    <div class="grid">

      <a
        *ngFor="let prod of produtosFiltrados | slice:0:quantidadeVisivel"
        [routerLink]="['/pdp', prod.id]"
        class="card-link"
      >
        <div class="card">

          <div class="card-img">
            <img [src]="prod.img" [alt]="prod.nome">
          </div>

          <div class="card-info">
            <h4>{{ prod.nome }}</h4>
            <p>R$ {{ prod.preco }}</p>
          </div>

        </div>
      </a>

    </div>

    <button
      *ngIf="quantidadeVisivel < produtosFiltrados.length"
      (click)="verMais()"
    >
      Ver mais
    </button>

  </main>

</div>
