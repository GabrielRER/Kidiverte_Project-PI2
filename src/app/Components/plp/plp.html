<div class="container">

  <aside class="filtro">
    <h2>Filtros</h2>

    <div class="filtro-secao">
      <h3>Categoria</h3>
      <label><input type="checkbox" (change)="toggleFiltro(categoriasSelecionadas, 1, $event)"> Carrinhos</label>
      <label><input type="checkbox" (change)="toggleFiltro(categoriasSelecionadas, 2, $event)"> Bonecas</label>
      <label><input type="checkbox" (change)="toggleFiltro(categoriasSelecionadas, 3, $event)"> Colecionáveis</label>
      <label><input type="checkbox" (change)="toggleFiltro(categoriasSelecionadas, 4, $event)"> Bebês</label>
      <label><input type="checkbox" (change)="toggleFiltro(categoriasSelecionadas, 5, $event)"> Esportes</label>
      <label><input type="checkbox" (change)="toggleFiltro(categoriasSelecionadas, 6, $event)"> Jogos</label>
    </div>

    <div class="filtro-secao">
      <h3>Gênero</h3>
      <label><input type="checkbox" (change)="toggleFiltro(generosSelecionados, 1, $event)"> Masculino</label>
      <label><input type="checkbox" (change)="toggleFiltro(generosSelecionados, 2, $event)"> Feminino</label>
      <label><input type="checkbox" (change)="toggleFiltro(generosSelecionados, 3, $event)"> Unissex</label>
    </div>

    <div class="filtro-secao">
      <h3>Idade</h3>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 1, $event)"> 2 a 3 anos</label>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 2, $event)"> 3 a 5 anos</label>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 3, $event)"> 5 a 7 anos</label>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 4, $event)"> 7 a 9 anos</label>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 5, $event)"> 9 a 12 anos</label>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 6, $event)"> 13+</label>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 7, $event)"> 18+</label>
    </div>

    <div class="filtro-secao">
      <h3>Marca</h3>
      <label><input type="checkbox" (change)="toggleFiltro(marcasSelecionadas, 1, $event)"> Lego</label>
      <label><input type="checkbox" (change)="toggleFiltro(marcasSelecionadas, 2, $event)"> Hasbro</label>
      <label><input type="checkbox" (change)="toggleFiltro(marcasSelecionadas, 3, $event)"> Mattel</label>
      <label><input type="checkbox" (change)="toggleFiltro(marcasSelecionadas, 4, $event)"> Bandai</label>
      <label><input type="checkbox" (change)="toggleFiltro(marcasSelecionadas, 5, $event)"> Melissa & Doug</label>
      <label><input type="checkbox" (change)="toggleFiltro(marcasSelecionadas, 6, $event)"> Funko</label>
      <label><input type="checkbox" (change)="toggleFiltro(marcasSelecionadas, 7, $event)"> Pokémon</label>
      <label><input type="checkbox" (change)="toggleFiltro(marcasSelecionadas, 8, $event)"> Roblox</label>
    </div>

    <div class="filtro-secao">
      <h3>Faixa de preço</h3>

      <input
        type="range"
        min="5"
        max="5000"
        [value]="precoMax"
        (input)="onPrecoChange($event)"
      >

      <p>R$ 5,00 - R$ {{ precoMax }}</p>
    </div>

    <div class="logo">
      <img src="/Logos/logo_circular.png" alt="logo">
    </div>
  </aside>

  
  <main class="produtos">

    <div class="grid">

      <div *ngFor="let prod of produtosFiltrados | slice:0:quantidadeVisivel">
        <app-card [product]="prod"></app-card>
      </div>

    </div>

    
    <p class="contador">
      Mostrando {{ quantidadeVisivel > produtosFiltrados.length ? produtosFiltrados.length : quantidadeVisivel }}
      de {{ produtosFiltrados.length }} itens
    </p>

    <button
      *ngIf="quantidadeVisivel < produtosFiltrados.length"
      (click)="verMais()"
    >
      mostrar mais
    </button>

  </main>

</div>
