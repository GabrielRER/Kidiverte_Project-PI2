<div class="container">

  <!-- COLUNA DE FILTROS -->
  <aside class="filtro">
    <h2>Filtros</h2>

    <!-- FILTRO DE CATEGORIA -->
    <div class="filtro-secao">
      <h3>Categoria</h3>

      <!-- Cada checkbox adiciona/remove um ID no array de filtros -->
      <label><input type="checkbox" [checked]="categoriasSelecionadas.includes(1)" (change)="toggleFiltro(categoriasSelecionadas, 1, $event)"> Carrinhos</label>
      <label><input type="checkbox" [checked]="categoriasSelecionadas.includes(2)" (change)="toggleFiltro(categoriasSelecionadas, 2, $event)"> Blocos de Construção</label>
      <label><input type="checkbox" [checked]="categoriasSelecionadas.includes(3)" (change)="toggleFiltro(categoriasSelecionadas, 3, $event)"> Bonecas</label>
      <label><input type="checkbox" [checked]="categoriasSelecionadas.includes(4)" (change)="toggleFiltro(categoriasSelecionadas, 4, $event)"> Colecionáveis</label>
      <label><input type="checkbox" [checked]="categoriasSelecionadas.includes(5)" (change)="toggleFiltro(categoriasSelecionadas, 5, $event)"> Bebês / Brinquedos de Atividades</label>
      <label><input type="checkbox" [checked]="categoriasSelecionadas.includes(6)" (change)="toggleFiltro(categoriasSelecionadas, 6, $event)"> Esportes e Exterior</label>
      <label><input type="checkbox" [checked]="categoriasSelecionadas.includes(7)" (change)="toggleFiltro(categoriasSelecionadas, 7, $event)"> Jogos de Tabuleiro e Cartas</label>
    </div>

    <!-- FILTRO DE GÊNERO -->
    <div class="filtro-secao">
      <h3>Gênero</h3>
      <label><input type="checkbox" (change)="toggleFiltro(generosSelecionados, 1, $event)"> Masculino</label>
      <label><input type="checkbox" (change)="toggleFiltro(generosSelecionados, 2, $event)"> Feminino</label>
      <label><input type="checkbox" (change)="toggleFiltro(generosSelecionados, 3, $event)"> Unissex</label>
    </div>

    <!-- FILTRO DE IDADE -->
    <div class="filtro-secao">
      <h3>Idade</h3>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 1, $event)"> Baby (0 a 3 anos)</label>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 2, $event)"> 3 a 5 anos</label>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 3, $event)"> 5 a 7 anos</label>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 4, $event)"> 7 a 9 anos</label>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 5, $event)"> 9 a 12 anos</label>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 6, $event)"> 13+ anos</label>
      <label><input type="checkbox" (change)="toggleFiltro(idadesSelecionadas, 7, $event)"> 18+ anos</label>
    </div>

    <!-- FILTRO DE MARCA -->
    <div class="filtro-secao">
      <h3>Marca</h3>
      <label><input type="checkbox" [checked]="marcasSelecionadas.includes(1)" (change)="toggleFiltro(marcasSelecionadas, 1, $event)"> Lego</label>
      <label><input type="checkbox" [checked]="marcasSelecionadas.includes(2)" (change)="toggleFiltro(marcasSelecionadas, 2, $event)"> Hasbro</label>
      <label><input type="checkbox" [checked]="marcasSelecionadas.includes(3)" (change)="toggleFiltro(marcasSelecionadas, 3, $event)"> Mattel</label>
      <label><input type="checkbox" [checked]="marcasSelecionadas.includes(4)" (change)="toggleFiltro(marcasSelecionadas, 4, $event)"> Bandai</label>
      <label><input type="checkbox" [checked]="marcasSelecionadas.includes(5)" (change)="toggleFiltro(marcasSelecionadas, 5, $event)"> Melissa & Doug</label>
      <label><input type="checkbox" [checked]="marcasSelecionadas.includes(6)" (change)="toggleFiltro(marcasSelecionadas, 6, $event)"> Funko</label>
      <label><input type="checkbox" [checked]="marcasSelecionadas.includes(7)" (change)="toggleFiltro(marcasSelecionadas, 7, $event)"> Pokémon</label>
      <label><input type="checkbox" [checked]="marcasSelecionadas.includes(8)" (change)="toggleFiltro(marcasSelecionadas, 8, $event)"> Roblox</label>
      <label><input type="checkbox" [checked]="marcasSelecionadas.includes(9)" (change)="toggleFiltro(marcasSelecionadas, 9, $event)"> Candide</label>
    </div>

    <!-- FILTRO DE PREÇO -->
    <div class="filtro-secao">
      <h3>Faixa de preço</h3>

      <!-- Slider controla o valor máximo -->
      <input
        type="range"
        min="5"
        max="1000"
        [value]="precoMax"
        (input)="onPrecoChange($event)"
      >

      <!-- Exibição dinâmica do valor -->
      <p>R$ 5,00 - R$ {{ precoMax }}</p>
    </div>

    <!-- LOGO DECORATIVA -->
    <div class="logo">
      <img src="/Logos/logo_circular.png" alt="logo">
    </div>
  </aside>

  <!-- ÁREA DE PRODUTOS -->
  <main class="produtos">

    <!-- GRID DE CARDS -->
    <div class="grid">

      <!-- Renderiza produtos limitando pela quantidadeVisivel -->
      <div *ngFor="let prod of produtosFiltrados | slice:0:quantidadeVisivel">
        <app-card [product]="prod"></app-card>
      </div>

    </div>

    <!-- CONTADOR DE ITENS EXIBIDOS -->
    <p class="contador">
      Mostrando {{ quantidadeVisivel > produtosFiltrados.length ? produtosFiltrados.length : quantidadeVisivel }}
      de {{ produtosFiltrados.length }} itens
    </p>

    <!-- BOTÃO DE PAGINAÇÃO -->
    <button
      *ngIf="quantidadeVisivel < produtosFiltrados.length"
      (click)="verMais()"
    >
      mostrar mais
    </button>

  </main>

</div>
