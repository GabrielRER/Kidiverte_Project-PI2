<!-- Wrapper externo: fornece o fundo branco e o padding ao redor da navbar -->
<div class="navbar-wrapper" [ngClass]="{ 'login-page': isLoginPage() }">

  <!-- Barra de navegação principal: layout flex com 3 seções (logo | busca | ícones) -->
  <nav class="navbar-container" [ngClass]="{ 'login-page': isLoginPage() }">

    <!-- ===== SEÇÃO ESQUERDA: Logo da marca ===== -->
    <div class="left-section">
      <!-- Logo retangular da KiDiverte carregada de /Logos/ -->
      <img src="/Logos/logo_retangular.png" alt="KiDiverte Logo" class="brand-logo">
    </div>

    <!-- ===== SEÇÃO CENTRAL: Barra de busca ===== -->
    <!-- flex: 1 no CSS faz esta seção crescer e ocupar o espaço disponível entre logo e ícones -->
    <div class="search-container">
      <input
        type="text"
        placeholder="Buscar produto..."
        class="search-input"
      >
      <!-- Botão de busca com ícone SVG de lupa (desenhado inline, sem imagem externa) -->
      <!-- aria-label garante acessibilidade para leitores de tela -->
      <button class="search-btn" aria-label="Buscar">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>           <!-- Círculo da lupa -->
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line> <!-- Cabo da lupa -->
        </svg>
      </button>
    </div>

    <!-- ===== SEÇÃO DIREITA: Ícones de Perfil e Carrinho ===== -->
    <div class="right-section">

      <!-- Botão de perfil do usuário (funcionalidade futura) -->
      <button class="icon-btn" aria-label="Perfil do Usuário" (click)="navigateProfile()">
        <!-- Ícone SVG de pessoa: silhueta de usuário desenhada inline -->
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path> <!-- Corpo/ombros -->
          <circle cx="12" cy="7" r="4"></circle>                        <!-- Cabeça -->
        </svg>
      </button>

      <!-- Botão do carrinho de compras -->
      <!-- (click) chama abrirCartSidebar() no TS, que emite o evento para o componente pai -->
      <button class="icon-btn" aria-label="Carrinho de Compras" (click)="abrirCartSidebar()">
        <!-- Ícone SVG de carrinho desenhado inline -->
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9"  cy="21" r="1"></circle>  <!-- Roda esquerda do carrinho -->
          <circle cx="20" cy="21" r="1"></circle>  <!-- Roda direita do carrinho -->
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          <!-- Corpo do carrinho -->
        </svg>
      </button>

    </div>
  </nav>
</div>
