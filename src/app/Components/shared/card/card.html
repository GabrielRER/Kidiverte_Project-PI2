<mat-card id="card-container" appearance="outlined">
    <div class="container-image">
        <img [src]="imageUrl" alt="Imagem do produto">
    </div>

    <mat-card-content id="body-content">

        <div class="title-container">
            <app-star-rate id="starRate"></app-star-rate>
            <p>
                Lego Minecraft Enderman
            </p>
        </div>

        <div class="price-container">
            <span id="price">
                Por R$ 30,99
            </span>
            <br>
            <span>
                ou 6x R$ 5,17 s/ juros
            </span>
        </div>

    </mat-card-content>

    <mat-card-actions>

        <button mat-flat-button id="add-button">Adicionar</button>

    </mat-card-actions>


</mat-card>
